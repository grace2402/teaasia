{% extends "base1.html" %}

{% block title %}
編輯 SIM 卡狀態
</div>
{% endblock %}

{% block page_content %}
<div class="container-fluid">
<div class="edit-card">
    <h2>編輯 SIM 卡狀態</h2>
    <form method="post" action="{{ url_for('main.edit_simcard_status', record_id=record.id) }}">
        <!-- CSRF 隱藏欄位 -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="pid">PID</label>
            <input type="text" class="form-control" id="pid" name="pid" value="{{ record.pid }}" required>
        </div>

        <div class="form-group">
            <label for="iccid">ICCID</label>
            <input type="text" class="form-control" id="iccid" name="iccid" value="{{ record.iccid }}" required>
        </div>

        <div class="form-group">
            <label for="status">狀態</label>
            <select class="form-control" id="status" name="status" required onchange="checkDeadWarning()">
                {% for opt in allowed_statuses %}
                    <option value="{{ opt }}" {% if record.status == opt %}selected{% endif %}>{{ opt }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- ⚠️ 解約警告區塊 -->
        <div id="deadWarning" class="alert alert-danger mt-2" style="display: none;">
            ⚠️ <strong>注意：</strong>選擇 <code>dead</code>（解約）後將無法再啟用該 SIM 卡，請確認是否為永久停用需求。
        </div>

        <div class="form-group">
            <label for="group">Group</label>
            <input type="text" class="form-control" id="group" name="group" value="{{ record.group }}">
        </div>

        <button type="submit" class="btn btn-primary">更新</button>
        <a href="{{ url_for('main.simcard_status') }}" class="btn btn-secondary">返回</a>
    </form>
</div>

<!-- JavaScript 警告控制 -->
<script>
function checkDeadWarning() {
    const status = document.getElementById("status").value;
    const warning = document.getElementById("deadWarning");
    if (status === "dead") {
        warning.style.display = "block";
    } else {
        warning.style.display = "none";
    }
}

// 頁面載入時就執行一次檢查
document.addEventListener("DOMContentLoaded", checkDeadWarning);
</script>
{% endblock %}
