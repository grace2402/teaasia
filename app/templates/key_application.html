{% extends "base1.html" %}

{% block title %}金鑰申請{% endblock %}

{% block page_content %}
<div class="container-fluid mt-4">
    <div class="card-container" style="max-width: 700px; margin: 0 auto;">
        <h2 style="text-align: center; margin-bottom: 32px;">金鑰申請</h2>
        <form id="keyApplicationForm">
            <div class="form-group">
                <label for="userName">使用者名稱</label>
                <input type="text" class="form-control" id="userName" name="userName" placeholder="輸入使用者名稱" required>
            </div>

            <div class="form-group">
                <label for="identity">身分證字號</label>
                <input type="text" class="form-control" id="identity" name="identity" placeholder="輸入身分證字號" required>
            </div>

            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="輸入電子郵件" required>
            </div>

            <div class="form-group">
                <label for="phone">手機號碼</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="輸入手機號碼" required>
            </div>

            <div class="form-group">
                <label for="tpcNo">台電編號 (tpcNo)</label>
                <input type="text" class="form-control" id="tpcNo" name="tpcNo" placeholder="輸入台電編號" required>
            </div>

            <div class="form-group">
                <label for="openDateTime">開通日期</label>
                <input type="date" class="form-control" id="openDateTime" name="openDateTime" required>
            </div>

            <div class="form-group">
                <label for="image">文件圖片</label>
                <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
            </div>

            <button type="submit" class="btn-gradient" style="width: 100%; margin-top: 16px;">送出申請</button>
        </form>

        <div id="result" class="mt-4"></div>
    </div>
</div>

<style>
  #result.loading::before {
    content: '連線中…';
    display: block;
    font-style: italic;
    color: #555;
  }
  #result .error {
    color: #c00;
  }
</style>

<script>
  const CORS_PROXY = "https://cors-anywhere.herokuapp.com";
  const API_DOMAIN = "https://api-eg3.nextdrive.io";
  const resultEl = document.getElementById("result");
  const formEl = document.getElementById("keyApplicationForm");

  formEl.addEventListener("submit", async function (e) {
    e.preventDefault();
    resultEl.classList.add("loading");
    resultEl.innerHTML = "";

    const userName     = document.getElementById("userName").value;
    const identity     = document.getElementById("identity").value;
    const email        = document.getElementById("email").value;
    const phone        = document.getElementById("phone").value;
    const tpcNo        = document.getElementById("tpcNo").value;
    const openDateTime = document.getElementById("openDateTime").value;
    const imageFile    = document.getElementById("image").files[0];

    const payload = { userName, identity, email, phone, openDateTime, tpcNo };

    try {
      const res = await fetch("/nd/taipowermeters", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const firstText = await res.text();
      resultEl.classList.remove("loading");
      resultEl.innerHTML = `
        <h4>第一支 API 回應 HTTP ${res.status}</h4>
        <pre>${firstText}</pre>
      `;
      if (!res.ok) {
        return;
      }

      let json;
      try {
        json = JSON.parse(firstText);
      } catch {
        resultEl.innerHTML += `<p class="error">無法解析第一支 API 回應為 JSON</p>`;
        return;
      }
      const hemsNo = json.data && json.data.hemsNo;
      if (!hemsNo) {
        resultEl.innerHTML += `<p class="error">回應中缺少 data.hemsNo</p>`;
        return;
      }

      const formData = new FormData();
      formData.append("image", imageFile);

      const imgRes = await fetch(
        `${CORS_PROXY}/${API_DOMAIN}/api/v1/taipowermeters/${encodeURIComponent(hemsNo)}/agreeImage`,
        {
          method: "POST",
          mode: "cors",
          headers: {
            "Accept": "application/json",
            "Authorization": "Bearer hemstw-i-am-hemstw"
          },
          body: formData,
        }
      );

      const secondText = await imgRes.text();
      resultEl.innerHTML += `
        <h4>第二支 API 回應 HTTP ${imgRes.status}</h4>
        <pre>${secondText}</pre>
      `;
    } catch (err) {
      resultEl.classList.remove("loading");
      resultEl.innerHTML = `<p class="error">執行錯誤：${err.message}</p>`;
      console.error(err);
    }
  });
</script>
{% endblock %}
