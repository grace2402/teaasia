{% extends "base1.html" %}

{% block title %}BESS 多場域監控{% endblock %}

{% block head %}
    {{ super() }}
    <style>
        /* ===== 深色主題 ===== */
        body.monitoring-body {
            background: #0f1923 !important;
            color: #e0e6ed;
        }

        .monitoring-header {
            background: linear-gradient(135deg, #1a2a3a, #0f1923);
            padding: 20px 32px;
            border-bottom: 2px solid #2a4a6a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .monitoring-header h2 {
            margin: 0;
            font-size: 28px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .monitoring-header .subtitle {
            font-size: 14px;
            color: #8899aa;
            margin-top: 4px;
        }

        .connection-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1a2a3a;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #2a4a6a;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4ade80;
        }

        /* ── 連線狀態燈號 ── */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
        }
        .status-dot.connected {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }
        .status-dot.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        @keyframes pulse {
            0%,100%{opacity:1} 50%{opacity:.4}
        }

        .connection-field {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connection-field label {
            color: #8899aa;
            font-size: 13px;
        }

        .connection-field input {
            background: #0f1923;
            border: 1px solid #2a4a6a;
            color: #e0e6ed;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            width: 140px;
        }

        .btn-connect {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-connect:hover { opacity: .85; }

        .btn-disconnect {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        /* ===== 監控卡片 ===== */
        .monitoring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            padding: 24px 32px;
        }

        .monitor-card {
            background: #1a2a3a;
            border-radius: 12px;
            border: 1px solid #2a4a6a;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .monitor-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);
        }

        .card-header {
            background: linear-gradient(135deg, #1e3a5f, #1a2a3a);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a4a6a;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #00d4ff;
        }

        .card-id {
            font-size: 12px;
            color: #667788;
            font-family: monospace;
        }

        .card-timestamp {
            font-size: 13px;
            color: #8899aa;
        }

        /* SOC 條 */
        .soc-section {
            padding: 16px 20px;
            background: #0f1923;
        }

        .soc-bar-container {
            background: #2a3a4a;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .soc-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #4ade80);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .soc-bar.low {
            background: linear-gradient(90deg, #ef4444, #f59e0b);
        }

        .soc-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 700;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* 指標網格 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px 20px;
        }

        .metric-item {
            background: #0f1923;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a4a6a;
        }

        .metric-label {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
        }

        .metric-value.purple { color: #a855f7; }
        .metric-value.yellow { color: #fbbf24; }
        .metric-value.red { color: #ef4444; }
        .metric-value.blue { color: #3b82f6; }
        .metric-value.cyan { color: #06b6d4; }
        .metric-value.green { color: #4ade80; }

        /* Delta V */
        .delta-v-section {
            padding: 8px 20px;
            background: #0f1923;
            border-top: 1px solid #2a4a6a;
            font-size: 14px;
            color: #e0e6ed;
        }

        /* 功率區 */
        .power-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px 20px;
            background: #0f1923;
            border-top: 1px solid #2a4a6a;
        }

        .power-item {
            background: #1a2a3a;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .power-label {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .power-value {
            font-size: 24px;
            font-weight: 700;
        }

        .power-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .power-tag.charging {
            background: #3b82f6;
            color: white;
        }

        .power-tag.discharging {
            background: #4ade80;
            color: #0f1923;
        }

        .power-tag.idle {
            background: #6b7280;
            color: white;
        }

        /* 預測區 */
        .prediction-section {
            padding: 12px 20px;
            background: #0f1923;
            border-top: 1px solid #2a4a6a;
        }

        .prediction-title {
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 8px;
        }

        .prediction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prediction-item {
            text-align: center;
        }

        .prediction-item .label {
            font-size: 11px;
            color: #667788;
        }

        .prediction-item .value {
            font-size: 16px;
            font-weight: 600;
            color: #e0e6ed;
        }

        /* 篩選列 */
        .filter-row {
            display: flex;
            gap: 12px;
            padding: 16px 32px;
            background: #1a2a3a;
            border-bottom: 1px solid #2a4a6a;
            align-items: flex-end;
        }

        .filter-row .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-row label {
            font-size: 12px;
            color: #8899aa;
        }

        .filter-row input,
        .filter-row select {
            background: #0f1923;
            border: 1px solid #2a4a6a;
            color: #e0e6ed;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .filter-row .btn-gradient {
            padding: 8px 20px;
            font-size: 14px;
        }

        /* ===== JS 動態卡片樣式 ===== */

        .site-card {
            background: #1a2a3a;
            border-radius: 12px;
            border: 1px solid #2a4a6a;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .site-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);
        }

        /* Header */
        .site-header {
            background: linear-gradient(135deg, #1e3a5f, #1a2a3a);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a4a6a;
        }

        .site-name {
            font-size: 20px;
            font-weight: 700;
            color: #00d4ff;
        }

        .site-uuid {
            font-size: 12px;
            color: #667788;
            font-family: monospace;
        }

        .site-time {
            font-size: 13px;
            color: #8899aa;
        }

        /* SOC */
        .soc-wrap { padding: 16px 20px; }

        .soc-track {
            background: #2a3a4a;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .soc-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #4ade80);
            border-radius: 12px;
            transition: width 0.5s ease;
        }

        .soc-label {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 700;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .soc-label.dark {
            background: linear-gradient(90deg, #ef4444, #f59e0b);
        }

        /* Metrics */
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px 20px;
        }

        .metric {
            background: #0f1923;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a4a6a;
        }

        .m-label {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .m-value {
            font-size: 20px;
            font-weight: 700;
        }

        .metric.purple .m-value { color: #a855f7; }
        .metric.yellow .m-value { color: #fbbf24; }
        .metric.red .m-value   { color: #ef4444; }
        .metric.blue .m-value  { color: #3b82f6; }

        .m-unit { font-size: 14px; opacity: 0.7; margin-left: 2px; }

        /* Delta V */
        .delta-row {
            padding: 8px 20px;
            background: #0f1923;
            border-top: 1px solid #2a4a6a;
            font-size: 14px;
            color: #e0e6ed;
        }

        /* Power */
        .power-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px 20px;
            background: #0f1923;
            border-top: 1px solid #2a4a6a;
        }

        .power-card {
            background: #1a2a3a;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .p-label {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .p-value {
            font-size: 24px;
            font-weight: 700;
        }

        .p-value.idle        { color: #6b7280; }
        .p-value.discharging { color: #4ade80; }
        .p-value.charging    { color: #3b82f6; }

        .p-unit { font-size: 14px; opacity: 0.7; margin-left: 2px; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }

        .badge.dis { background: #4ade80; color: #0f1923; }
        .badge.chg { background: #3b82f6; color: white; }

        .ems-val { font-size: 24px; font-weight: 700; color: #e0e6ed; }

        /* Forecast */
        .forecast-wrap { padding: 12px 20px; background: #0f1923; border-top: 1px solid #2a4a6a; }

        .forecast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .forecast-title { font-size: 13px; color: #8899aa; }

        .forecast-status { font-size: 12px; font-weight: 600; }
        .forecast-status.alert { color: #ef4444; }
        .forecast-status.warn  { color: #f59e0b; }

        .forecast-track {
            background: #2a3a4a;
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .forecast-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #fbbf24);
            border-radius: 8px;
            transition: width 0.5s ease;
        }

        .forecast-fill.alert { background: linear-gradient(90deg, #ef4444, #f59e0b); }
        .forecast-fill.warn  { background: linear-gradient(90deg, #fbbf24, #f59e0b); }

        .forecast-contract-line {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: #ef4444;
        }

        .forecast-nums {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 13px;
            color: #8899aa;
        }

        .f-val { color: #e0e6ed; font-weight: 600; }
        .f-pct { font-weight: 700; }
        .f-pct.alert { color: #ef4444; }
        .f-pct.warn  { color: #f59e0b; }

        /* Flash animation */
        @keyframes flashAnim {
            0%   { background: rgba(0,212,255,0.3); }
            100% { background: transparent; }
        }

        .flash { animation: flashAnim 0.6s ease-out; }

        /* ===== GW Tooltip ===== */
        .gw-tooltip-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            display: none;
        }

        .gw-tooltip-overlay.active {
            display: block;
        }

        .gw-tooltip {
            position: fixed;
            z-index: 9999;
            background: #1a2a3a;
            border: 1px solid #2a4a6a;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            max-width: 480px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 0;
            display: none;
            font-size: 13px;
        }

        .gw-tooltip.active {
            display: block;
        }

        .gw-tooltip-header {
            background: linear-gradient(135deg, #1e3a5f, #1a2a3a);
            padding: 14px 18px;
            border-bottom: 1px solid #2a4a6a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gw-tooltip-header h3 {
            margin: 0;
            font-size: 16px;
            color: #00d4ff;
        }

        .gw-tooltip-close {
            background: none;
            border: none;
            color: #8899aa;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }

        .gw-tooltip-close:hover {
            color: #fff;
        }

        .gw-tooltip-body {
            padding: 16px 18px;
        }

        .gw-tooltip-loading {
            text-align: center;
            padding: 30px;
            color: #8899aa;
        }

        .gw-tooltip-loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2a4a6a;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .gw-tooltip-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .gw-tooltip-summary-item {
            background: #0f1923;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2a4a6a;
        }

        .gw-tooltip-summary-item .label {
            font-size: 11px;
            color: #667788;
            margin-bottom: 4px;
        }

        .gw-tooltip-summary-item .value {
            font-size: 18px;
            font-weight: 700;
        }

        .gw-tooltip-gw {
            background: #0f1923;
            border: 1px solid #2a4a6a;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .gw-tooltip-gw-header {
            padding: 10px 14px;
            background: #152232;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .gw-tooltip-gw-header:hover {
            background: #1a2a3a;
        }

        .gw-tooltip-gw-name {
            font-weight: 600;
            color: #e0e6ed;
        }

        .gw-tooltip-gw-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .gw-tooltip-gw-status.blue { background: #3b82f6; }
        .gw-tooltip-gw-status.yellow { background: #eab308; }
        .gw-tooltip-gw-status.red { background: #ef4444; }
        .gw-tooltip-gw-status.orange { background: #f97316; }

        .gw-tooltip-devices {
            padding: 10px 14px;
            display: none;
        }

        .gw-tooltip-devices.expanded {
            display: block;
        }

        .gw-tooltip-device {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #1a2a3a;
        }

        .gw-tooltip-device:last-child {
            border-bottom: none;
        }

        .gw-tooltip-device-name {
            color: #c0c8d0;
            font-size: 12px;
        }

        .gw-tooltip-device-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #1a2a3a;
            color: #8899aa;
        }

        .gw-tooltip-error {
            text-align: center;
            padding: 20px;
            color: #ef4444;
        }

        .gw-tooltip-cached {
            font-size: 11px;
            color: #667788;
            text-align: right;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #2a4a6a;
        }

        .site-card[data-has-gw] {
            cursor: pointer;
        }

        .site-card[data-has-gw]:hover::after {
            content: '🔍 點擊查看 GW 設備';
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a3a;
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            border: 1px solid #2a4a6a;
            z-index: 10;
        }

        .site-card[data-has-gw] {
            position: relative;
        }

        /* GW Status Dot — 卡片右上角小圓點 */
        .gw-status-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6b7280;
            transition: background 0.3s ease;
            z-index: 5;
        }
        .gw-status-dot.blue   { background: #3b82f6; box-shadow: 0 0 6px #3b82f680; }
        .gw-status-dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab30880; }
        .gw-status-dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
        .gw-status-dot.orange { background: #f97316; box-shadow: 0 0 6px #f9731680; }
    </style>
{% endblock %}

{% block page_content %}
<div class="monitoring-body">
    <!-- 頂部標題列 -->
    <div class="monitoring-header">
        <div>
            <h2>
                <span style="font-size: 32px;">⚡</span>
                BESS 多場域監控
            </h2>
            <div class="subtitle">即時儲能系統數據</div>
        </div>

        <div class="connection-bar">
            <div class="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="conn-label">未連線</span>
            </div>
            <div class="connection-field">
                <label>Host:</label>
                <input type="text" id="cfg-host" value="119.31.178.22" style="width:150px">
            </div>
            <div class="connection-field">
                <label>Port:</label>
                <input type="text" id="cfg-port" value="8083" style="width:65px">
            </div>
            <div class="connection-field">
                <label>Topic:</label>
                <input type="text" id="cfg-topic" value="ND_ScMaintenance" style="width:180px">
            </div>
            <button class="btn-connect" id="btn-connect">連線</button>
            <button class="btn-disconnect" id="btn-disconnect" style="display:none">斷線</button>
        </div>
    </div>

    <!-- 監控卡片網格 (JS 動態生成) -->
    <div class="monitoring-grid" id="sites-grid"></div>
</div>

<!-- MQTT: library + modules (load order matters) -->
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script>
    // Inject sites data from backend — dynamic based on enable_monitoring=True spots
    window.MONITORING_SITES = {{ items | tojson }};
</script>
<script src="{{ url_for('static', filename='js/monitoring-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-dom.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-forecast-ui.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-forecast.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-card.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-tooltip.js') }}"></script>
<script src="{{ url_for('static', filename='js/monitoring-update.js') }}"></script>
