services:
  teaasia-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_CONFIG=default
      - DB_HOST=teaasia-db
      - REDIS_HOST=teaasia-redis
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # GW API Auth: JWT token or API Key (optional, auto-detects from env)
      # If set, overrides Cognito flow for NDFMS gateway status checking
      - NDFMS_JWT_TOKEN=${NDFMS_JWT_TOKEN:-}
      # Cognito credentials (fallback auth mode)
      - USER_POOL_ID=${USER_POOL_ID}
      - CLIENT_ID=${CLIENT_ID}
      - USERNAME=${COGNITO_USERNAME:-vip}
      - PASSWORD=${COGNITO_PASSWORD:-link4581}
      # Stripe Payment (from .env)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      teaasia-db:
        condition: service_healthy
      teaasia-redis:
        condition: service_started
    restart: always

  teaasia-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teaasia}
      POSTGRES_USER: ${POSTGRES_USER:-teaasia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teaasia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaasia"]
      interval: 10s
      timeout: 5s
      retries: 5

  teaasia-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
