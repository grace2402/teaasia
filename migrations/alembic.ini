[alembic]
# Database URL for migrations
sqlalchemy.url = postgresql://postgres:Link4581%%21@192.168.8.124:5432/postgres

# template for migration files
# file_template = %(rev)s_%(slug)s

# set to 'true' to run environment during revision command
# revision_environment = false



[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
